<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tablero Gatuno</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<main class="app">
<section id="pantallaInicio" class="panel">
    <h1>Tablero Gatuno</h1>
    <p>Elige el tamaño del tablero para comenzar 🐾</p>

    <div class="opciones-tablero">
    <button onclick="elegirTablero(5, 6)">Tablero pequeño<br><span>5 x 6</span></button>
    <button onclick="elegirTablero(6, 7)">Tablero grande<br><span>6 x 7</span></button>
    </div>
</section>

<section id="pantallaJuego" class="oculto">
    <header class="header-juego">
    <h1>Tablero Gatuno</h1>
    <p id="mensaje">Prepara el tablero escondiendo gatos.</p>
    </header>

<div id="controles" class="controles">
<button id="btnAgregar" onclick="abrirSelectorColores()">Añadir gatos</button>
<button id="btnHecho" class="oculto" onclick="guardarGatos()">Hecho</button>
<button id="btnIniciar" onclick="iniciarJuego()">Iniciar juego</button>

<button id="btnInspeccion" class="oculto" onclick="activarInspeccion()">Ver 3x3</button>
<button id="btnConfirmarInspeccion" class="oculto" onclick="confirmarInspeccion()">Hecho</button>
<button id="btnCancelarInspeccion" class="oculto" onclick="cancelarInspeccion()">Cancelar</button>
</div>

    <div id="selectorColores" class="selector-colores oculto">
    <p>Elige tu color de gato:</p>
    <div id="botonesColores" class="botones-colores"></div>
    </div>

    <p id="progreso" class="progreso">Jugadores listos: 0 / mínimo 2</p>

    <section id="tablero" class="tablero"></section>
</section>
</main>

<div id="overlay" class="overlay oculto">
<div class="reveal-card">
    <img id="cajaGrande" src="img/caja.png" alt="Caja misteriosa" class="caja-grande" />
    <img id="gatoGrande" src="" alt="Gato revelado" class="gato-grande oculto" />
    <h2 id="resultadoTexto"></h2>
</div>
</div>

<audio id="sonidoGato" src="audio/gato.mp3"></audio>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<script src="script.js"></script>
</body>
</html>
